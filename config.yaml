# SNOMED CT Radiology Procedure Deconstructor - Configuration

# Terminology servers available to build/query concept maps against.
terminology_servers:
  - id: tx-csiro
    label: "tx.ontoserver.csiro.au"
    url: "https://tx.ontoserver.csiro.au/fhir"
  - id: r4-csiro
    label: "r4.ontoserver.csiro.au"
    url: "https://r4.ontoserver.csiro.au/fhir"
  - id: tx-dev-hl7-au
    label: "tx.dev.hl7.org.au"
    url: "https://tx.dev.hl7.org.au/fhir"
  - id: tx-hl7-au
    label: "tx.hl7.org.au"
    url: "https://tx.hl7.org.au/fhir"
  - id: localhost
    label: "localhost:8080 (local dev)"
    url: "http://localhost:8080/fhir"

# FHIR ValueSets containing precoordinated radiology procedures, selectable in the UI.
valuesets:
  - id: ranzcr
    label: "RANZCR Radiology Referral"
    url: "https://ranzcr.com/fhir/ValueSet/radiology-referral-1"
  - id: au-imaging
    label: "AU Imaging Procedure"
    url: "https://healthterminologies.gov.au/fhir/ValueSet/imaging-procedure-1"

# Default (valueset, terminology server) combo selected on startup and by --refresh.
default_valueset: ranzcr
default_terminology_server: r4-csiro

# Concept map cache — one file per (valueset, terminology server) combo, under
# cache_dir. Built on first refresh, reloaded on subsequent starts.
cache_dir: "cache"
cache_enabled: true

# Flask settings
flask_debug: true
flask_port: 5000
